<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Raja Topup</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}?v=fix-sosmed-20260701">
</head>
<body class="site-body">
<div class="auth-card auth-card-wide">
    <h1>Reset Password</h1>
    <p class="auth-muted">Buat password baru untuk akun user Anda.</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="alert {{ category }}">{{ message }}</div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form method="POST">
        <label>Password Baru</label>
        <input type="password" name="password" minlength="6" placeholder="Minimal 6 karakter" required>
        <label>Konfirmasi Password Baru</label>
        <input type="password" name="confirm_password" minlength="6" placeholder="Ulangi password baru" required>
        <button class="btn-checkout" type="submit">Simpan Password Baru</button>
    </form>

    <p><a href="{{ url_for('auth.login') }}">Kembali ke Login</a></p>
</div>
</body>
</html>
