{% extends 'layouts/admin.html' %}{% block heading %}Website Builder{% endblock %}{% block content %}<form class="panel form-row" method="post"><input name="section_key" placeholder="section key" required><input name="title" placeholder="Judul"><textarea name="content" placeholder="Konten"></textarea><input name="sort_order" type="number" value="0"><label><input name="is_active" type="checkbox" checked> Aktif</label><button>Tambah Section</button></form><div class="panel"><table><tr><th>Key</th><th>Judul</th><th>Konten</th><th>Urutan</th><th>Status</th></tr>{% for s in sections %}<tr><td>{{s.section_key}}</td><td>{{s.title}}</td><td>{{s.content}}</td><td>{{s.sort_order}}</td><td>{{'Aktif' if s.is_active else 'Nonaktif'}}</td></tr>{% endfor %}</table></div>{% endblock %}
