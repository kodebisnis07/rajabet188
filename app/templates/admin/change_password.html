{% extends 'admin/base.html' %}
{% block content %}
<div class="page-head">
  <h1>Ganti Password Akun</h1>
  <p>Admin, Operator, dan Super Admin dapat mengganti password akunnya sendiri.</p>
</div>

<form class="settings-form" method="POST" autocomplete="off">
  <h2>Keamanan Akun</h2>

  <label>Password Lama</label>
  <div class="password-field">
    <input id="currentPassword" type="password" name="current_password" placeholder="Masukkan password lama" required>
    <button type="button" class="toggle-pass" data-target="currentPassword">👁</button>
  </div>

  <label>Password Baru</label>
  <div class="password-field">
    <input id="newPassword" type="password" name="new_password" placeholder="Minimal 6 karakter" required minlength="6">
    <button type="button" class="toggle-pass" data-target="newPassword">👁</button>
  </div>

  <label>Konfirmasi Password Baru</label>
  <div class="password-field">
    <input id="confirmPassword" type="password" name="confirm_password" placeholder="Ulangi password baru" required minlength="6">
    <button type="button" class="toggle-pass" data-target="confirmPassword">👁</button>
  </div>

  <button type="submit">Simpan Password Baru</button>
  <p class="muted" style="text-align:left;margin-top:12px">Password disimpan dalam bentuk hash, bukan teks biasa.</p>
</form>

<script>
document.querySelectorAll('.toggle-pass').forEach(function(btn){
  btn.addEventListener('click', function(){
    var input = document.getElementById(btn.dataset.target);
    if(!input) return;
    input.type = input.type === 'password' ? 'text' : 'password';
    btn.textContent = input.type === 'password' ? '👁' : '🙈';
  });
});
</script>
{% endblock %}
