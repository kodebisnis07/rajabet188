{% extends 'layouts/admin.html' %}{% block heading %}Media Manager{% endblock %}{% block content %}<form class="panel form-row" method="post"><input name="title" placeholder="Judul media" required><input name="file_url" placeholder="URL file/gambar" required><select name="media_type"><option>image</option><option>banner</option><option>icon</option><option>document</option></select><button>Tambah</button></form><div class="panel"><table><tr><th>Judul</th><th>URL</th><th>Tipe</th><th>Waktu</th></tr>{% for m in media_files %}<tr><td>{{m.title}}</td><td>{{m.file_url}}</td><td>{{m.media_type}}</td><td>{{m.created_at}}</td></tr>{% endfor %}</table></div>{% endblock %}
