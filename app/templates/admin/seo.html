{% extends 'layouts/admin.html' %}{% block heading %}SEO Manager{% endblock %}{% block content %}<form class="panel settings-form" method="post"><label>Page<input name="page" placeholder="home / promosi / vip" required></label><label>Meta Title<input name="meta_title" placeholder="Judul SEO"></label><label>Meta Description<textarea name="meta_description" placeholder="Deskripsi SEO"></textarea></label><label>OG Image<input name="og_image" placeholder="URL gambar share"></label><button>Simpan SEO</button></form><div class="panel"><table><tr><th>Page</th><th>Title</th><th>Description</th><th>OG Image</th></tr>{% for s in seo_items %}<tr><td>{{s.page}}</td><td>{{s.meta_title}}</td><td>{{s.meta_description}}</td><td>{{s.og_image}}</td></tr>{% endfor %}</table></div>{% endblock %}
