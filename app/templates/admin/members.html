{% extends 'layouts/admin.html' %}{% block heading %}Member Manager{% endblock %}{% block content %}<div class="panel"><table><tr><th>Username</th><th>Email</th><th>Role</th><th>VIP</th><th>Saldo</th><th>Status</th><th>Edit Cepat</th></tr>{% for m in members %}<tr><td>{{m.username}}</td><td>{{m.email}}</td><td>{{m.role}}</td><td>{{m.vip_level}}</td><td>{{m.balance}}</td><td>{{'Aktif' if m.is_active else 'Nonaktif'}}</td><td><form method="post" class="inline-form"><input type="hidden" name="member_id" value="{{m.id}}"><input name="balance" type="number" step="0.01" value="{{m.balance}}"><select name="vip_level"><option {{'selected' if m.vip_level=='Bronze'}}>Bronze</option><option {{'selected' if m.vip_level=='Silver'}}>Silver</option><option {{'selected' if m.vip_level=='Gold'}}>Gold</option><option {{'selected' if m.vip_level=='Platinum'}}>Platinum</option></select><label><input name="is_active" type="checkbox" {% if m.is_active %}checked{% endif %}> Aktif</label><button>Simpan</button></form></td></tr>{% endfor %}</table></div>{% endblock %}
