{% extends 'layouts/admin.html' %}{% block heading %}Promo Manager{% endblock %}{% block content %}<form class="panel form-row" method="post"><input name="title" placeholder="Judul promo" required><input name="badge" placeholder="Badge"><input name="image_url" placeholder="URL gambar"><input name="start_at" placeholder="Mulai"><input name="end_at" placeholder="Selesai"><textarea name="description" placeholder="Deskripsi"></textarea><label><input name="is_active" type="checkbox" checked> Aktif</label><button>Tambah</button></form><div class="panel"><table><tr><th>Badge</th><th>Judul</th><th>Periode</th><th>Status</th><th>Aksi</th></tr>{% for p in promos %}<tr><td>{{p.badge}}</td><td>{{p.title}}</td><td>{{p.start_at}} - {{p.end_at}}</td><td>{{'Aktif' if p.is_active else 'Nonaktif'}}</td><td><a href="/admin/promos/{{p.id}}/delete" onclick="return confirm('Hapus?')">Hapus</a></td></tr>{% endfor %}</table></div>{% endblock %}
