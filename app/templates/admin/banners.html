{% extends 'layouts/admin.html' %}{% block heading %}Banner Manager{% endblock %}{% block content %}<form class="panel form-row" method="post"><input name="title" placeholder="Judul" required><input name="subtitle" placeholder="Subtitle"><input name="image_url" placeholder="URL gambar"><input name="button_text" placeholder="Teks tombol"><input name="button_url" placeholder="URL tombol"><input name="placement" value="homepage"><input name="sort_order" type="number" value="0"><label><input name="is_active" type="checkbox" checked> Aktif</label><button>Tambah</button></form><div class="panel"><table><tr><th>Judul</th><th>Placement</th><th>Urutan</th><th>Status</th><th>Aksi</th></tr>{% for b in banners %}<tr><td>{{b.title}}</td><td>{{b.placement}}</td><td>{{b.sort_order}}</td><td>{{'Aktif' if b.is_active else 'Nonaktif'}}</td><td><a href="/admin/banners/{{b.id}}/delete" onclick="return confirm('Hapus?')">Hapus</a></td></tr>{% endfor %}</table></div>{% endblock %}
