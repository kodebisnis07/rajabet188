{% extends 'layouts/admin.html' %}{% block heading %}Provider Manager{% endblock %}{% block content %}<form class="panel form-row" method="post"><input name="name" placeholder="Nama provider" required><input name="category" placeholder="Kategori" required><input name="icon" placeholder="Icon" value="🎮"><input name="logo_url" placeholder="URL logo"><input name="sort_order" type="number" value="0"><label><input name="is_active" type="checkbox" checked> Aktif</label><button>Tambah</button></form><div class="panel"><table><tr><th>Icon</th><th>Nama</th><th>Kategori</th><th>Urutan</th><th>Status</th><th>Aksi</th></tr>{% for p in providers %}<tr><td>{{p.icon}}</td><td>{{p.name}}</td><td>{{p.category}}</td><td>{{p.sort_order}}</td><td>{{'Aktif' if p.is_active else 'Nonaktif'}}</td><td><a href="/admin/providers/{{p.id}}/toggle">Toggle</a> · <a href="/admin/providers/{{p.id}}/delete" onclick="return confirm('Hapus?')">Hapus</a></td></tr>{% endfor %}</table></div>{% endblock %}
