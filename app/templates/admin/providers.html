{% extends 'layouts/admin.html' %}{% block heading %}Provider Manager{% endblock %}{% block content %}<form class="panel form-row" method="post"><input name="name" placeholder="Nama provider" required><input name="category" placeholder="Kategori" required><input name="icon" placeholder="Icon" value="🎮"><button>Tambah</button></form><div class="panel"><table><tr><th>Icon</th><th>Nama</th><th>Kategori</th><th>Status</th></tr>{% for p in providers %}<tr><td>{{p.icon}}</td><td>{{p.name}}</td><td>{{p.category}}</td><td>{{'Aktif' if p.is_active else 'Nonaktif'}}</td></tr>{% endfor %}</table></div>{% endblock %}
