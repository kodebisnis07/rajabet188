{% extends 'layouts/admin.html' %}{% block heading %}Payment Gateway{% endblock %}{% block content %}<form class="panel form-row" method="post"><input name="name" placeholder="Nama gateway" required><input name="code" placeholder="Kode unik" required><select name="mode"><option>manual</option><option>api</option><option>sandbox</option></select><textarea name="config_json" placeholder='{"api_key":""}'></textarea><label><input name="is_active" type="checkbox"> Aktif</label><button>Tambah</button></form><div class="panel"><table><tr><th>Nama</th><th>Kode</th><th>Mode</th><th>Status</th></tr>{% for g in gateways %}<tr><td>{{g.name}}</td><td>{{g.code}}</td><td>{{g.mode}}</td><td>{{'Aktif' if g.is_active else 'Nonaktif'}}</td></tr>{% endfor %}</table></div>{% endblock %}
