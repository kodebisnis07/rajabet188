services:
  - type: web
    name: raja-topup-games
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn run:app
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SESSION_COOKIE_SECURE
        value: "1"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: raja-topup-games-db
          property: connectionString

databases:
  - name: raja-topup-games-db
    databaseName: raja_topup_games
    user: raja_topup_games_user
